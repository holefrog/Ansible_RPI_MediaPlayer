---
- name: Check Media Player Services Status
  hosts: all
  gather_facts: no
  tasks:
    - name: Check System Services Status
      become: yes
      ansible.builtin.command: "systemctl is-active bluetooth bluetooth-a2dp-autopair"
      register: system_status
      ignore_errors: yes
      changed_when: false

    - name: Check User Services Status
      become: no
      ansible.builtin.command: "systemctl --user is-active pipewire wireplumber squeezelite shairport-sync oled volume"
      environment:
        XDG_RUNTIME_DIR: "{{ mediaplayer_runtime_dir | default('/run/user/1000') }}"
      register: user_status
      ignore_errors: yes
      changed_when: false

    - name: Report Services Status
      ansible.builtin.debug:
        msg: 
          - "===== SYSTEM SERVICES ====="
          - "bluetooth, autopair:"
          - "{{ system_status.stdout_lines }}"
          - "===== USER SERVICES ====="
          - "pipewire, wireplumber, squeezelite, airplay, oled, volume:"
          - "{{ user_status.stdout_lines }}"