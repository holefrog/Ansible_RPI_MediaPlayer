---
- name: Check Media Player Services Status
  hosts: all
  gather_facts: no
  tasks:
    - name: Check System Services Status
      become: yes
      ansible.builtin.command: "systemctl is-active {{ item }}"
      loop:
        - bluetooth
        - bluetooth-a2dp-autopair
      register: system_status
      ignore_errors: yes
      changed_when: false

    - name: Check User Services Status
      become: no
      ansible.builtin.command: "systemctl --user is-active {{ item }}"
      loop:
        - pipewire
        - wireplumber
        - squeezelite
        - shairport-sync
        - oled
        - volume
      environment:
        XDG_RUNTIME_DIR: "{{ mediaplayer_runtime_dir | default('/run/user/1000') }}"
      register: user_status
      ignore_errors: yes
      changed_when: false

    - name: Report Services Status
      ansible.builtin.debug:
        msg: |
          ===== SYSTEM SERVICES =====
          {% for res in system_status.results %}
          {{ '%-25s' | format(res.item) }}: {{ res.stdout }}
          {% endfor %}
          ===== USER SERVICES =====
          {% for res in user_status.results %}
          {{ '%-25s' | format(res.item) }}: {{ res.stdout }}
          {% endfor %}