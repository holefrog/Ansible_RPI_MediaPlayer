---
# tasks file for airplay

- name: Install Shairport-Sync package
  become: yes
  ansible.builtin.apt:
    name: shairport-sync
    state: present

- name: Create metadata pipe
  become: yes
  ansible.builtin.command: "mkfifo {{ METADATA_PIPE }}"
  args:
    creates: "{{ METADATA_PIPE }}"

- name: Ensure correct permissions on metadata pipe
  become: yes
  ansible.builtin.file:
    path: "{{ METADATA_PIPE }}"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: '0664'

- name: Ensure Shairport-Sync config directory exists
  become: yes
  ansible.builtin.file:
    path: /etc/shairport-sync
    state: directory
    mode: '0755'

- name: Generate Shairport-Sync config
  become: yes
  ansible.builtin.template:
    src: shairport-sync.conf.j2
    dest: /etc/shairport-sync/shairport-sync.conf
    mode: '0644'
  notify: restart airplay service

- name: Disable system-wide Shairport-Sync service
  become: yes
  ansible.builtin.systemd:
    name: shairport-sync.service
    state: stopped
    enabled: no
    masked: yes
  ignore_errors: yes

- name: Ensure user systemd directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/systemd/user"
    state: directory
    mode: '0755'
  become: no

- name: Generate systemd user service for Shairport-Sync
  ansible.builtin.template:
    src: shairport-sync.service.j2
    dest: "{{ ansible_env.HOME }}/.config/systemd/user/shairport-sync.service"
    mode: '0644'
  become: no
  notify: 
    - reload systemd user daemon
    - restart airplay service

- name: Enable and start Shairport-Sync user service
  ansible.builtin.systemd:
    name: shairport-sync.service
    state: started
    enabled: yes
    scope: user
    daemon_reload: yes
  become: no

- name: Initialize default PipeWire sink volume
  ansible.builtin.command: "pactl set-sink-volume @DEFAULT_SINK@ {{ airplay_default_sink_volume | default('100') }}%"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_user_uid }}"
  become: no
  changed_when: true
  ignore_errors: yes
