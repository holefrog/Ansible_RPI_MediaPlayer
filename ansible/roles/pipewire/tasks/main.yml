---
# tasks file for pipewire

- name: Install PipeWire and related packages
  become: yes
  ansible.builtin.apt:
    name:
      - pipewire
      - pipewire-pulse
      - wireplumber
      - pipewire-audio-client-libraries
      - pulseaudio-utils
    state: present
    update_cache: yes

- name: Ensure user systemd directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/systemd/user"
    state: directory
    mode: '0755'
  become: no

- name: Enable and start PipeWire user services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
    scope: user
    daemon_reload: yes
  become: no
  with_items:
    - pipewire.service
    - pipewire-pulse.service
    - wireplumber.service
