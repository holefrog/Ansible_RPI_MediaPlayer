---
# tasks file for pipewire

- name: Install PipeWire and WirePlumber packages
  become: yes
  ansible.builtin.apt:
    name:
      - pipewire
      - wireplumber
      - pipewire-pulse
      - pipewire-alsa
    state: present

- name: Enable and start PipeWire user services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
    scope: user
  loop:
    - pipewire.service
    - wireplumber.service
    - pipewire-pulse.service
  become: no