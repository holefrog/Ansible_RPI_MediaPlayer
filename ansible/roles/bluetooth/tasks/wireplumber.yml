---
---
- name: Ensure WirePlumber config directory exists
  ansible.builtin.file:
    path: "{{ mediaplayer_home }}/.config/wireplumber/wireplumber.conf.d"
    state: directory
    mode: '0755'
  become: no

- name: Remove broken WirePlumber bluetooth routing configuration
  ansible.builtin.file:
    path: "{{ mediaplayer_home }}/.config/wireplumber/wireplumber.conf.d/51-bluetooth-fix.conf"
    state: absent
  become: no
  notify: restart user pipewire services
