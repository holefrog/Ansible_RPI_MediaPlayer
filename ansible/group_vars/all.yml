---
# Global group_vars/all.yml
# Extracted from config.ini

# SSH Configuration (typically passed in inventory or command line, but default here for reference)
ansible_user: "player"
ansible_port: 22

# System
timezone: "America/Vancouver"
auto_update: "yes"
boot_config_file: "/boot/firmware/config.txt"

# Hardware / OLED
oled_bus: 3
oled_sda_pin: 4
oled_scl_pin: 5

# Timeouts
apt_lock_timeout: 60
pipewire_ready_timeout: 30
ssh_connect_timeout: 10
reboot_wait_timeout: 180
reboot_poll_interval: 5
deployment_initial_wait: 2
deployment_offline_wait: 5
bt_init_delay: 2
bt_rfkill_delay: 2

# Audio
default_hw_volume: 95
default_sink_volume: 100

# LMS Server
lms_server_ip: "192.168.50.210"
lms_server_port: "9000"

# AirPlay metadata
metadata_pipe: "/tmp/shairport-sync-metadata"
