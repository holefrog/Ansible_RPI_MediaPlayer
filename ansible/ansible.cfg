[defaults]
inventory = inventory/hosts.ini
roles_path = ./roles
# 全局指定 Python 解释器路径，消除警告并提升执行速度
# 若想保持自动发现但静默警告，可改为 auto_silent
interpreter_python = /usr/bin/python3

# 屏蔽所有“弃用提示 (Deprecation Warnings)”以保持输出整洁
deprecation_warnings = False

# 关闭 SSH 主机密钥检查，避免重装树莓派系统后因指纹改变导致连接失败
host_key_checking = False

[ssh_connection]
# 开启 Pipelining（管道化），极大地提升执行速度，减少文件传输开销
# 注意：要求目标机器的 /etc/sudoers 中没有 requiretty 配置（现代 Linux 默认均已移除）
pipelining = True

# 开启 IdentitiesOnly=yes 强制仅使用指定的私钥，避免尝试过多私钥导致连接被拒绝
# 保留 ControlMaster 等默认参数以维持连接复用加速
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o IdentitiesOnly=yes